# Configuração do SonarQube para Hermes Comercial
# Este arquivo contém as propriedades de configuração para análise de código

# Identificação do projeto
sonar.projectKey=hermescomercial
sonar.organization=hermescomercial
sonar.projectName=Hermes Comercial
sonar.projectVersion=3.2.0

# Configurações de código fonte
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.sourceEncoding=UTF-8
sonar.java.source=21
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Exclusões
sonar.exclusions=**/model/**,**/dto/**,**/config/**,**/generated/**
sonar.test.exclusions=**/test/resources/**

# Cobertura de testes
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Qualidade de código
sonar.qualitygate.wait=true

# Regras específicas
sonar.java.spotbugs.reportPaths=target/spotbugs/spotbugsXml.xml
sonar.checkstyle.reportPaths=target/checkstyle-result.xml

# Análise de duplicação
sonar.cpd.java.minimumTokens=50
sonar.duplication.minimumTokens=50

# Tamanhos máximos
sonar.squid.java.maxLineLength=120
