# Configuração do Log4j 2 via Properties
# Para usar logging estruturado, comente este arquivo e descomente log4j2-structured.xml

# Root logger
rootLogger.level=info
rootLogger.appenderRef.stdout=stdout
rootLogger.appenderRef.rolling=rolling

# Loggers específicos
logger.hermes.name=com.br.hermescomercial
logger.hermes.level=debug
logger.hermes.appenderRef.stdout=stdout
logger.hermes.appenderRef.rolling=rolling
logger.hermes.additivity=false

logger.service.name=com.br.hermescomercial.service
logger.service.level=debug
logger.service.appenderRef.stdout=stdout
logger.service.appenderRef.rolling=rolling
logger.service.additivity=false

logger.dao.name=com.br.hermescomercial.dao
logger.dao.level=debug
logger.dao.appenderRef.rolling=rolling
logger.dao.additivity=false

logger.repository.name=com.br.hermescomercial.repository
logger.repository.level=debug
logger.repository.appenderRef.rolling=rolling
logger.repository.additivity=false

logger.controller.name=com.br.hermescomercial.controller
logger.controller.level=info
logger.controller.appenderRef.rolling=rolling
logger.controller.additivity=false

# Appender Console
appender.stdout.type=Console
appender.stdout.name=stdout
appender.stdout.layout.type=PatternLayout
appender.stdout.layout.pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# Appender Rolling File
appender.rolling.type=RollingFile
appender.rolling.name=rolling
appender.rolling.fileName=logs/hermes-comercial.log
appender.rolling.filePattern=logs/hermes-comercial-%d{yyyy-MM-dd}-%i.log.gz
appender.rolling.layout.type=PatternLayout
appender.rolling.layout.pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.rolling.policies.type=Policies
appender.rolling.policies.time.type=TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval=1
appender.rolling.policies.time.modulate=true
appender.rolling.policies.size.type=SizeBasedTriggeringPolicy
appender.rolling.policies.size.size=10MB
appender.rolling.strategy.type=DefaultRolloverStrategy
appender.rolling.strategy.max=30

# Appender Error File
appender.error.type=RollingFile
appender.error.name=error
appender.error.fileName=logs/hermes-comercial-error.log
appender.error.filePattern=logs/hermes-comercial-error-%d{yyyy-MM-dd}-%i.log.gz
appender.error.layout.type=PatternLayout
appender.error.layout.pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n%ex
appender.error.policies.type=Policies
appender.error.policies.time.type=TimeBasedTriggeringPolicy
appender.error.policies.time.interval=1
appender.error.policies.time.modulate=true
appender.error.policies.size.type=SizeBasedTriggeringPolicy
appender.error.policies.size.size=10MB
appender.error.strategy.type=DefaultRolloverStrategy
appender.error.strategy.max=30

# Appender Audit File
appender.audit.type=RollingFile
appender.audit.name=audit
appender.audit.fileName=logs/hermes-comercial-audit.log
appender.audit.filePattern=logs/hermes-comercial-audit-%d{yyyy-MM-dd}-%i.log.gz
appender.audit.layout.type=PatternLayout
appender.audit.layout.pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.audit.policies.type=Policies
appender.audit.policies.time.type=TimeBasedTriggeringPolicy
appender.audit.policies.time.interval=1
appender.audit.policies.time.modulate=true
appender.audit.policies.size.type=SizeBasedTriggeringPolicy
appender.audit.policies.size.size=10MB
appender.audit.strategy.type=DefaultRolloverStrategy
appender.audit.strategy.max=30

# Loggers de terceiros
logger.ibatis.name=org.apache.ibatis
logger.ibatis.level=warn

logger.spring.name=org.springframework
logger.spring.level=warn

logger.hibernate.name=org.hibernate
logger.hibernate.level=warn
