version: '3.8'

services:
  hermes-pdv:
    build:
      context: .
      dockerfile: Dockerfile-javafx
    container_name: hermes-pdv-javafx
    environment:
      - DISPLAY=${DISPLAY:-:99}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - hermes-network

networks:
  hermes-network:
    driver: bridge
