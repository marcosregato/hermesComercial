version: '3.8'

services:
  hermes-pdv:
    build: .
    container_name: hermes-pdv-desktop
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - hermes-network

networks:
  hermes-network:
    driver: bridge
